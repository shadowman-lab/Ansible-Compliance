---
# Simple CIS RHEL 9 Compliance Assessment using OPA
# Collects facts and validates against CIS RHEL 9 benchmark

- name: CIS RHEL 9 Compliance Assessment
  hosts: rhel
  gather_facts: false
  become: true

  roles:
    - rhel_cis
    - role: aac_store_results
      vars:
        aac_result_policy_name: "CIS RHEL 9"
        aac_result_policy_version: "CIS Red Hat Enterprise Linux 9 Benchmark v2.0.0"
        aac_result_total_controls: 338
        aac_result_violations: "{{ violations }}"
        aac_result_failed_controls: "{{ total_violations | int }}"
        aac_result_passed_controls: "{{ 338 - (total_violations | int) }}"
        aac_result_compliance_pct: "{{ compliance_score }}"
        aac_result_metadata: "{{ {'hostname': inventory_hostname, 'ip_address': ansible_default_ipv4.address | default('unknown'), 'distribution': ansible_distribution, 'distribution_version': ansible_distribution_version, 'kernel': ansible_kernel, 'architecture': ansible_architecture, 'assessment_time': assessment_timestamp, 'is_compliant': is_compliant} }}"
        aac_result_opa_server: "{{ opa_server_url }}"
