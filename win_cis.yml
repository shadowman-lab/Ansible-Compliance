---
# Simple CIS Windows Compliance Assessment using OPA
# Collects facts and validates against CIS Windows benchmark

- name: Windows Compliance Assessment
  hosts: all
  gather_facts: true
  become: true

  roles:
    - win_cis
    - role: aac_store_results
      vars:
        aac_result_framework:       "cis_windows_2022"
        aac_result_policy_name:     "CIS Windows Server 2022"
        aac_result_policy_version:  "CIS Microsoft Windows Server 2022 Benchmark v3.0.0"
        aac_result_total_controls:  "{{ cis_total_controls | int }}"
        aac_result_violations:      "{{ cis_violations }}"
        aac_result_failed_controls: "{{ violation_count | int }}"
        aac_result_passed_controls: "{{ passed_controls | int }}"
        aac_result_compliance_pct:  "{{ compliance_score_pct | float }}"
        aac_result_metadata:
          hostname: "{{ inventory_hostname }}"
          ip_address: "{{ ansible_ip_addresses[0] | default('N/A') }}"
          assessment_time: "{{ ansible_date_time.iso8601 }}"
          os_distribution: "{{ ansible_distribution }}"
          os_family: "{{ ansible_os_family }}"
          architecture: "{{ ansible_architecture }}"
          domain: "{{ ansible_domain | default('WORKGROUP') }}"
          section_compliance: "{{ compliance_result.section_compliance | default({}) }}"
          opa_server: "{{ opa_server_url }}"
        aac_result_opa_server: "{{ opa_server_url }}"
