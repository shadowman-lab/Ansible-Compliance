---
- name: Create a compliance database
  community.postgresql.postgresql_db:
    name: "{{ pg_db }}"
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"

- name: Create compliance_results table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS compliance_results (
        id                    SERIAL PRIMARY KEY,
        hostname              VARCHAR(255),
        ip_address            VARCHAR(45),
        framework             VARCHAR(100) NOT NULL,
        policy_name           VARCHAR(255),
        policy_version        VARCHAR(100),
        total_controls        INTEGER,
        passed_controls       INTEGER,
        failed_controls       INTEGER,
        compliance_percentage DECIMAL(5,2),
        compliant             BOOLEAN,
        violations            JSONB,
        metadata              JSONB,
        details               JSONB,
        captured_at           TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        evaluation_timestamp  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        facts_id              INTEGER
      )

- name: Create compliance_results indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_results_hostname   ON compliance_results(hostname)"
    - "CREATE INDEX IF NOT EXISTS idx_results_framework  ON compliance_results(framework)"
    - "CREATE INDEX IF NOT EXISTS idx_results_timestamp  ON compliance_results(evaluation_timestamp DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_results_compliant  ON compliance_results(compliant)"
  failed_when: false

# ── compliance_facts ───────────────────────────────────────────────────────────
# Raw Ansible facts stored before OPA evaluation (feeds store_fact_in_db.yml pattern).

- name: Create compliance_facts table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS compliance_facts (
        id              SERIAL PRIMARY KEY,
        hostname        VARCHAR(255) NOT NULL,
        ip_address      VARCHAR(45),
        framework       VARCHAR(100) NOT NULL,
        collected_at    TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        collection_job  INTEGER,
        schema_version  VARCHAR(20) DEFAULT '1.0',
        facts           JSONB NOT NULL
      )

- name: Create compliance_facts indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_facts_hostname   ON compliance_facts(hostname)"
    - "CREATE INDEX IF NOT EXISTS idx_facts_framework  ON compliance_facts(framework)"
    - "CREATE INDEX IF NOT EXISTS idx_facts_collected  ON compliance_facts(collected_at DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_facts_gin        ON compliance_facts USING gin(facts)"
  failed_when: false

# ── host_facts ─────────────────────────────────────────────────────────────────
# Nightly gather_facts snapshots per host (ADR-001).

- name: Create host_facts table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS host_facts (
        id              BIGSERIAL PRIMARY KEY,
        host_id         VARCHAR(255) NOT NULL,
        hostname        VARCHAR(255),
        ip_address      VARCHAR(45),
        os_family       VARCHAR(50),
        os_distribution VARCHAR(100),
        os_version      VARCHAR(50),
        cloud_provider  VARCHAR(50)  DEFAULT 'on_prem',
        aws_instance_id VARCHAR(50),
        aws_region      VARCHAR(50),
        collected_at    TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        collection_job  INTEGER,
        schema_version  VARCHAR(20)  DEFAULT '1.0',
        checksum        VARCHAR(64),
        facts           JSONB NOT NULL
      )

- name: Create host_facts indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_host_facts_host_id   ON host_facts(host_id)"
    - "CREATE INDEX IF NOT EXISTS idx_host_facts_collected  ON host_facts(collected_at DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_host_facts_os         ON host_facts(os_distribution)"
    - "CREATE INDEX IF NOT EXISTS idx_host_facts_cloud      ON host_facts(cloud_provider)"
    - "CREATE INDEX IF NOT EXISTS idx_host_facts_facts_gin  ON host_facts USING gin(facts)"
  failed_when: false

- name: Create host_facts_latest view
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE OR REPLACE VIEW host_facts_latest AS
        SELECT DISTINCT ON (host_id) *
        FROM host_facts
        ORDER BY host_id, collected_at DESC

# ── sidecar_datasets ───────────────────────────────────────────────────────────
# Organizational context: Digital Sovereignty declarations, NERC-CIP asset records, etc.

- name: Create sidecar_datasets table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS sidecar_datasets (
        id              BIGSERIAL PRIMARY KEY,
        sidecar_type    VARCHAR(100) NOT NULL,
        entity_id       VARCHAR(255) NOT NULL,
        collected_at    TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        valid_from      TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        valid_until     TIMESTAMP WITH TIME ZONE,
        schema_version  VARCHAR(20) DEFAULT '1.0',
        source          VARCHAR(50) DEFAULT 'manual',
        data            JSONB NOT NULL
      )

- name: Create sidecar_datasets indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_sidecar_type       ON sidecar_datasets(sidecar_type)"
    - "CREATE INDEX IF NOT EXISTS idx_sidecar_entity     ON sidecar_datasets(entity_id)"
    - "CREATE INDEX IF NOT EXISTS idx_sidecar_collected  ON sidecar_datasets(collected_at DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_sidecar_valid      ON sidecar_datasets(valid_from, valid_until)"
  failed_when: false

- name: Create sidecar_datasets_latest view
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE OR REPLACE VIEW sidecar_datasets_latest AS
        SELECT DISTINCT ON (sidecar_type, entity_id) *
        FROM sidecar_datasets
        ORDER BY sidecar_type, entity_id, collected_at DESC

# ── technical_debt_items ───────────────────────────────────────────────────────
# One row per scored violation, written by technical_debt_assessment.yml.
# Drives the heatmap dashboard and AI prioritization prompt.

- name: Create technical_debt_items table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS technical_debt_items (
        id                  BIGSERIAL PRIMARY KEY,
        hostname            VARCHAR(255)  NOT NULL,
        framework           VARCHAR(100)  NOT NULL,
        violation           TEXT          NOT NULL,
        debt_category       VARCHAR(50)   NOT NULL,  -- security | compliance | operational
        severity            VARCHAR(20)   NOT NULL,  -- CRITICAL | HIGH | MEDIUM | LOW
        complexity          VARCHAR(20)   NOT NULL,  -- quick_win | moderate | complex
        effort_hours        DECIMAL(6,1)  NOT NULL,
        priority_score      DECIMAL(8,2)  NOT NULL,
        debt_age_days       INTEGER       DEFAULT 0,
        status              VARCHAR(20)   DEFAULT 'open',  -- open | accepted | resolved
        first_seen          TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        last_seen           TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        resolved_at         TIMESTAMP WITH TIME ZONE,
        source_result_id    INTEGER REFERENCES compliance_results(id),
        metadata            JSONB,
        CONSTRAINT uq_debt_item UNIQUE (hostname, framework, violation)
      )

- name: Create technical_debt_items indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_hostname   ON technical_debt_items(hostname)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_framework  ON technical_debt_items(framework)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_category   ON technical_debt_items(debt_category)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_severity   ON technical_debt_items(severity)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_status     ON technical_debt_items(status)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_priority   ON technical_debt_items(priority_score DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_items_last_seen  ON technical_debt_items(last_seen DESC)"
  failed_when: false

# ── technical_debt_summary ─────────────────────────────────────────────────────
# Per-host, per-assessment aggregated totals. Grafana reads this for heatmap panels.

- name: Create technical_debt_summary table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS technical_debt_summary (
        id                    BIGSERIAL PRIMARY KEY,
        hostname              VARCHAR(255) NOT NULL,
        assessed_at           TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        total_items           INTEGER      DEFAULT 0,
        critical_items        INTEGER      DEFAULT 0,
        high_items            INTEGER      DEFAULT 0,
        medium_items          INTEGER      DEFAULT 0,
        low_items             INTEGER      DEFAULT 0,
        total_effort_hours    DECIMAL(8,1) DEFAULT 0,
        security_hours        DECIMAL(8,1) DEFAULT 0,
        compliance_hours      DECIMAL(8,1) DEFAULT 0,
        operational_hours     DECIMAL(8,1) DEFAULT 0,
        debt_score                    DECIMAL(10,2) DEFAULT 0,
        sovereignty_hours             DECIMAL(8,1)  DEFAULT 0,
        critical_infrastructure_hours DECIMAL(8,1)  DEFAULT 0,
        frameworks_assessed           JSONB,
        ai_summary                    TEXT,
        ai_roadmap                    JSONB,
        metadata                      JSONB
      )

- name: Create technical_debt_summary indexes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_debt_summary_hostname   ON technical_debt_summary(hostname)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_summary_assessed   ON technical_debt_summary(assessed_at DESC)"
    - "CREATE INDEX IF NOT EXISTS idx_debt_summary_score      ON technical_debt_summary(debt_score DESC)"
  failed_when: false

- name: Create technical_debt_summary_latest view
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE OR REPLACE VIEW technical_debt_summary_latest AS
        SELECT DISTINCT ON (hostname) *
        FROM technical_debt_summary
        ORDER BY hostname, assessed_at DESC

# ── Migrations — add new columns to existing databases ────────────────────────
# These ADD COLUMN IF NOT EXISTS statements are safe to run on any version of
# the schema. They are no-ops if the columns already exist (fresh install).

- name: Add sovereignty and critical_infrastructure columns (migration)
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "ALTER TABLE technical_debt_summary ADD COLUMN IF NOT EXISTS sovereignty_hours             DECIMAL(8,1) DEFAULT 0"
    - "ALTER TABLE technical_debt_summary ADD COLUMN IF NOT EXISTS critical_infrastructure_hours DECIMAL(8,1) DEFAULT 0"
  failed_when: false

- name: Add missing columns to compliance_results (migration)
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "{{ item }}"
  loop:
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS hostname              VARCHAR(255)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS ip_address            VARCHAR(45)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS framework             VARCHAR(100)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS policy_name           VARCHAR(255)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS policy_version        VARCHAR(100)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS total_controls        INTEGER"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS passed_controls       INTEGER"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS failed_controls       INTEGER"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS compliance_percentage DECIMAL(5,2)"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS compliant             BOOLEAN"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS violations            JSONB"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS metadata              JSONB"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS evaluation_timestamp  TIMESTAMP"
    - "ALTER TABLE compliance_results ALTER COLUMN evaluation_timestamp SET DEFAULT CURRENT_TIMESTAMP"
    - "ALTER TABLE compliance_results ADD COLUMN IF NOT EXISTS facts_id              INTEGER"
    - |
      DO $$
      BEGIN
        IF EXISTS (
          SELECT 1 FROM information_schema.columns
          WHERE table_schema = current_schema()
            AND table_name   = 'compliance_results'
            AND column_name  = 'facts_id'
            AND data_type    = 'bigint'
        ) THEN
          ALTER TABLE compliance_results
            ALTER COLUMN facts_id TYPE INTEGER USING facts_id::INTEGER;
        END IF;
      END $$
  failed_when: false

# ── remediation_rates ──────────────────────────────────────────────────────────
# Per-domain hourly engineer rates for cost estimates. Overrides the hardcoded
# $185/hr default. OT engineers (critical_infrastructure) cost significantly
# more than general IT engineers.
#
# Default rates seeded on first install:
#   security=$175, compliance=$195, operational=$125,
#   critical_infrastructure=$285, sovereignty=$225, technology_lifecycle=$150

- name: Create remediation_rates table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS remediation_rates (
        tenant_id        VARCHAR(100)  NOT NULL DEFAULT 'default',
        debt_category    VARCHAR(50)   NOT NULL,
        hourly_rate_usd  DECIMAL(8,2)  NOT NULL,
        currency         VARCHAR(10)   DEFAULT 'USD',
        effective_from   DATE          NOT NULL DEFAULT CURRENT_DATE,
        notes            TEXT,
        PRIMARY KEY (tenant_id, debt_category, effective_from)
      )

- name: Seed default remediation rates
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      -- Normalize any rows seeded with CURRENT_DATE default to the canonical date
      -- so that the canonical INSERT below hits ON CONFLICT rather than duplicating.
      UPDATE remediation_rates
         SET effective_from = DATE '2024-01-01'
       WHERE tenant_id = 'default'
         AND effective_from <> DATE '2024-01-01';

      INSERT INTO remediation_rates (tenant_id, debt_category, hourly_rate_usd, effective_from, notes)
      VALUES
        ('default', 'security',                  175.00, DATE '2024-01-01', 'General security engineer'),
        ('default', 'compliance',                195.00, DATE '2024-01-01', 'GRC / regulatory specialist'),
        ('default', 'operational',               125.00, DATE '2024-01-01', 'SysAdmin / DevOps engineer'),
        ('default', 'critical_infrastructure',   285.00, DATE '2024-01-01', 'OT / ICS / SCADA specialist'),
        ('default', 'sovereignty',               225.00, DATE '2024-01-01', 'Privacy / legal engineer'),
        ('default', 'technology_lifecycle',      150.00, DATE '2024-01-01', 'IT asset management engineer')
      ON CONFLICT (tenant_id, debt_category, effective_from) DO NOTHING

# ── remediation_budgets ────────────────────────────────────────────────────────
# Quarterly budget allocations per domain (OT / IT / sovereignty).
# Enables budget burn-down panels in Grafana.

- name: Create remediation_budgets table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS remediation_budgets (
        tenant_id    VARCHAR(100)  NOT NULL DEFAULT 'default',
        domain       VARCHAR(50)   NOT NULL,
        period_start DATE          NOT NULL,
        period_end   DATE          NOT NULL,
        budget_hours DECIMAL(10,1),
        budget_usd   DECIMAL(12,2),
        team_name    TEXT,
        notes        TEXT,
        PRIMARY KEY (tenant_id, domain, period_start)
      )

- name: Add is_baseline column to compliance_facts
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "ALTER TABLE compliance_facts ADD COLUMN IF NOT EXISTS is_baseline BOOLEAN DEFAULT false"

- name: Add baseline_label column to compliance_facts
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "ALTER TABLE compliance_facts ADD COLUMN IF NOT EXISTS baseline_label VARCHAR(100)"

- name: Add index for baseline lookups
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: >
      CREATE INDEX IF NOT EXISTS idx_facts_baseline
      ON compliance_facts(hostname, is_baseline)
      WHERE is_baseline = true

# ── remediation_status ────────────────────────────────────────────────────
# One row per host+policy. Updated on every evaluation run.
# status lifecycle:
#   open → in_progress → resolved (auto when violations=0)
#   accepted_risk (sticky — human decision, not auto-cleared)
#   needs_reassessment (auto when policy_version changes)

- name: Create remediation_status table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS remediation_status (
        id               BIGSERIAL PRIMARY KEY,
        hostname         VARCHAR(255) NOT NULL,
        policy_name      VARCHAR(255) NOT NULL,
        policy_version   VARCHAR(100),
        latest_result_id BIGINT REFERENCES compliance_results(id) ON DELETE SET NULL,
        status           VARCHAR(20) NOT NULL DEFAULT 'open'
                          CHECK (status IN (
                            'open', 'in_progress', 'resolved',
                            'accepted_risk', 'needs_reassessment'
                          )),
        violation_count  INTEGER NOT NULL DEFAULT 0,
        first_detected   TIMESTAMPTZ NOT NULL DEFAULT now(),
        last_assessed    TIMESTAMPTZ,
        resolved_at      TIMESTAMPTZ,
        owner            VARCHAR(255),
        due_date         DATE,
        ticket_id        VARCHAR(100),
        notes            TEXT,
        created_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
        UNIQUE (hostname, policy_name)
      )

- name: Create indexes on remediation_status
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE INDEX IF NOT EXISTS idx_remediation_hostname
        ON remediation_status(hostname);
      CREATE INDEX IF NOT EXISTS idx_remediation_policy
        ON remediation_status(policy_name);
      CREATE INDEX IF NOT EXISTS idx_remediation_status
        ON remediation_status(status);
      CREATE INDEX IF NOT EXISTS idx_remediation_due_date
        ON remediation_status(due_date)
        WHERE due_date IS NOT NULL

# ── fact_changes ──────────────────────────────────────────────────────────
# Records diffs between consecutive fact snapshots for a host.
# Populated by Phase 2 (drift detection). Schema created now so
# Phase 1 queries can left-join against it without errors.

- name: Create fact_changes table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS fact_changes (
        id                BIGSERIAL PRIMARY KEY,
        hostname          VARCHAR(255) NOT NULL,
        previous_facts_id BIGINT REFERENCES compliance_facts(id) ON DELETE SET NULL,
        current_facts_id  BIGINT REFERENCES compliance_facts(id) ON DELETE SET NULL,
        detected_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
        changed_keys      JSONB,
        change_summary    TEXT,
        is_authorized     BOOLEAN DEFAULT false,
        change_ticket     VARCHAR(100),
        authorized_by     VARCHAR(255),
        authorized_at     TIMESTAMPTZ
      )

- name: Create indexes on fact_changes
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE INDEX IF NOT EXISTS idx_fact_changes_hostname
        ON fact_changes(hostname);
      CREATE INDEX IF NOT EXISTS idx_fact_changes_detected_at
        ON fact_changes(detected_at DESC);
      CREATE INDEX IF NOT EXISTS idx_fact_changes_unauthorized
        ON fact_changes(hostname, detected_at)
        WHERE is_authorized = false

# ── remediation_actions ───────────────────────────────────────────────────
# Audit trail of every remediation action taken on a host.

- name: Create remediation_actions table
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE TABLE IF NOT EXISTS remediation_actions (
        id              BIGSERIAL PRIMARY KEY,
        hostname        VARCHAR(255) NOT NULL,
        policy_name     VARCHAR(255),
        action_type     VARCHAR(20)
                        CHECK (action_type IN (
                          'reset_to_baseline', 'manual_fix',
                          'accepted_risk', 'false_positive'
                        )),
        facts_before_id BIGINT REFERENCES compliance_facts(id) ON DELETE SET NULL,
        facts_after_id  BIGINT REFERENCES compliance_facts(id) ON DELETE SET NULL,
        playbook_used   VARCHAR(255),
        aap_job_id      INTEGER,
        performed_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        performed_by    VARCHAR(255),
        notes           TEXT
      )

- name: Create indexes on remediation_actions
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5433) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      CREATE INDEX IF NOT EXISTS idx_remediation_actions_hostname
        ON remediation_actions(hostname);
      CREATE INDEX IF NOT EXISTS idx_remediation_actions_policy
        ON remediation_actions(policy_name);
      CREATE INDEX IF NOT EXISTS idx_remediation_actions_performed_at
        ON remediation_actions(performed_at DESC)

- name: Create compliance_reader role
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ aac_db_reader_user }}') THEN
          CREATE ROLE {{ aac_db_reader_user }} LOGIN PASSWORD '{{ aac_db_reader_password }}';
        END IF;
      END
      $$
  no_log: true

- name: Grant CONNECT to compliance_reader
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "GRANT CONNECT ON DATABASE {{ pg_db }} TO {{ aac_db_reader_user }}"

- name: Grant SELECT on all tables and views to compliance_reader
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: |
      GRANT USAGE ON SCHEMA public TO {{ aac_db_reader_user }};
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO {{ aac_db_reader_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT SELECT ON TABLES TO {{ aac_db_reader_user }}

- name: Grant SELECT on all sequences to compliance_reader
  community.postgresql.postgresql_query:
    login_host: "{{ pg_host }}"
    login_port: "{{ pg_port | default(5432) }}"
    login_user: "{{ pg_user }}"
    login_password: "{{ pg_password }}"
    login_db: "{{ pg_db }}"
    query: "GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO {{ aac_db_reader_user }}"
  failed_when: false
