---
- name: Get VyOS configuration JSON
  vyos.vyos.vyos_config:
    lines:
      - show | json
  register: vyos_config_raw
  changed_when: false
  failed_when: false

- name: Get VyOS version
  vyos.vyos.vyos_command:
  commands:
    - show version
  register: vyos_version_raw
  changed_when: false
  failed_when: false

# ── Parse and Build OPA Input ─────────────────────────────────────────────

- name: Parse VyOS configuration JSON
  ansible.builtin.set_fact:
    vyos_config: "{{ vyos_config_raw.stdout | from_json if vyos_config_raw.rc | default(1) == 0 and vyos_config_raw.stdout | trim != '' else {} }}"

- name: Extract version string
  ansible.builtin.set_fact:
    vyos_version_str: >-
      {{ (vyos_version_raw.stdout_lines | select('match', '.*VyOS.*') | list | first | default('VyOS unknown'))
          | regex_replace('Version:\\s+', '') | trim }}

- name: Build OPA input
  ansible.builtin.set_fact:
    opa_input:
      system:     "{{ vyos_config.system     | default({}) }}"
      service:    "{{ vyos_config.service     | default({}) }}"
      firewall:   "{{ vyos_config.firewall    | default({}) }}"
      interfaces: "{{ vyos_config.interfaces  | default({}) }}"
      protocols:  "{{ vyos_config.protocols   | default({}) }}"
      policy:     "{{ vyos_config.policy      | default({}) }}"
      version:    "{{ vyos_version_str }}"
      platform:   "vyos"
      hostname:   "{{ vyos_hostname }}"

# ── OPA Evaluation ─────────────────────────────────────────────────────────

- name: Query OPA — CIS VyOS
  ansible.builtin.uri:
    url: "{{ opa_server_url }}/v1/data/{{ policy_package }}/compliance_assessment"
    method: POST
    body_format: json
    body:
      input: "{{ opa_input }}"
    return_content: true
    status_code: 200
    validate_certs: false
  register: opa_response
  failed_when: false

- name: Parse OPA response
  ansible.builtin.set_fact:
    compliance_result: "{{ opa_response.json.result if (opa_response.status | default(0)) == 200 else {} }}"

- name: Normalise violations list
  ansible.builtin.set_fact:
    cis_violations: >-
      {%- set viols = [] -%}
      {%- for v in (compliance_result.violations | default([])) -%}
        {%- if v is mapping -%}
          {%- set _ = viols.append(v) -%}
        {%- else -%}
          {%- set _ = viols.append({'message': v | string, 'severity': 'high', 'control_id': ''}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ viols }}
