---
- name: Grab vyos facts
  vyos.vyos.vyos_facts:
    gather_subset: all
    gather_network_resources: all
  register: vyosfacts

- name: Build OPA input
  ansible.builtin.set_fact:
    opa_input:
      system:     "{{ vyos_config.system     | default({}) }}"
      service:    "{{ vyos_config.service     | default({}) }}"
      firewall:   "{{ vyos_config.firewall    | default({}) }}"
      interfaces: "{{ vyosfacts.ansible_facts.ansible_network_resources.interfaces  | default({}) }}"
      protocols:  "{{ vyos_config.protocols   | default({}) }}"
      policy:     "{{ vyos_config.policy      | default({}) }}"
      version:    "{{ vyosfacts.ansible_facts.ansible_net_version | default('unknown') }}"
      platform:   "vyos"
      hostname:   "{{ vyosfacts.ansible_facts.ansible_net_hostname | default('unknown') }}"

# ── OPA Evaluation ─────────────────────────────────────────────────────────

- name: Query OPA — CIS VyOS
  ansible.builtin.uri:
    url: "{{ opa_server_url }}/v1/data/{{ policy_package }}/compliance_assessment"
    method: POST
    body_format: json
    body:
      input: "{{ opa_input }}"
    return_content: true
    status_code: 200
    validate_certs: false
  register: opa_response
  failed_when: false

- name: Parse OPA response
  ansible.builtin.set_fact:
    compliance_result: "{{ opa_response.json.result if (opa_response.status | default(0)) == 200 else {} }}"

- name: Normalise violations list
  ansible.builtin.set_fact:
    cis_violations: >-
      {%- set viols = [] -%}
      {%- for v in (compliance_result.violations | default([])) -%}
        {%- if v is mapping -%}
          {%- set _ = viols.append(v) -%}
        {%- else -%}
          {%- set _ = viols.append({'message': v | string, 'severity': 'high', 'control_id': ''}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ viols }}
